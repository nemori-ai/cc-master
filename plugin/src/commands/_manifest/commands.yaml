version: 1
commands:
  - id: as-master-orchestrator
    required: true
    intent: initialize_or_resume_master_orchestrator
    argument_contract: "<goal> [--priority urgent|high|normal|low|trivial] [--wip N] [--owner-wip N] [--policy-switch allow|deny] | --resume [selector]"
    host_coverage:
      claude-code: implemented
      codex: prompt_prefix_hook
  - id: discuss
    required: true
    intent: discuss_awaiting_user_decision
    argument_contract: "<node-id> [--home <path>] [--board <board-stem>]"
    host_coverage:
      claude-code: implemented
      codex: conversational_guidance
  - id: handoff-to-new-session
    required: true
    intent: archive_with_handoff_for_resume
    argument_contract: ""
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
  - id: status
    required: true
    intent: render_board_status
    argument_contract: ""
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
  - id: stop
    required: true
    intent: archive_active_board
    argument_contract: ""
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
  - id: view
    required: true
    intent: open_local_board_view
    argument_contract: ""
    host_coverage:
      claude-code: implemented
      codex: skill_script_guided
