version: 1
commands:
  - id: as-master-orchestrator
    required: true
    intent: initialize_or_resume_master_orchestrator
    argument_contract: "<goal> [--priority urgent|high|normal|low|trivial] [--wip N] [--owner-wip N] [--policy-switch allow|deny] [--github-issue <issue-url>] | --resume [selector]"
    host_coverage:
      claude-code: implemented
      codex: prompt_prefix_hook
      cursor: host_native
  - id: discuss
    required: true
    intent: discuss_awaiting_user_decision
    argument_contract: "<node-id> [--home <path>] [--board <board-stem>]"
    host_coverage:
      claude-code: implemented
      codex: conversational_guidance
      cursor: host_native
  - id: distill
    required: true
    intent: distill_candidate_lessons_into_project_assets
    argument_contract: "<retro-path...> [--asset-type <disc,skill,workflow,subagent>] [--apply pr|draft] [--out-branch <name>]"
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
      cursor: host_native
  - id: handoff-to-new-session
    required: true
    intent: archive_with_handoff_for_resume
    argument_contract: ""
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
      cursor: host_native
  - id: retro
    required: true
    intent: retrospect_board_and_capture_candidate_lessons
    argument_contract: "[--home <path>] [--board <board-stem>] [--out <dir>]"
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
      cursor: host_native
  - id: stop
    required: true
    intent: archive_active_board
    argument_contract: ""
    host_coverage:
      claude-code: implemented
      codex: ccm_guided
      cursor: host_native
