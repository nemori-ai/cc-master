host: cursor
version: 1
surface: commands
native_surface: "plugin-commands-plus-beforeSubmitPrompt"
projection:
  required_mode: mixed
  modes:
    - host_native
  output_extension: ".md"
notes:
  - All required commands project host_native to plugin/dist/cursor/commands/.
  - stop projects as commands/cc-master-stop.md (frontmatter name: cc-master-stop) to avoid Cursor built-in /stop.
  - Bootstrap dual channel: host_native command + beforeSubmitPrompt hook.
  - Cursor plugin commands map to /{frontmatter name} in Agent chat (no plugin: namespace).
