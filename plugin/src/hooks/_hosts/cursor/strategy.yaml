host: cursor
version: 1
surface: hooks
status: phase-c-p0
registration:
  source: plugin-bundled
  target: hooks/hooks.json
  manifest: .cursor-plugin/plugin.json
  implemented_events:
    - beforeSubmitPrompt
    - preToolUse
    - postToolUse
    - stop
    - preCompact
  planned_events:
    - sessionStart
  unsupported_events:
    - PostToolBatch
  notes:
    - Phase C: P0 cores live; reinject Track B = alwaysApply rules/ + silent preCompact (no sessionStart context).
    - Path strategy (probe D1): relative commands from plugin cwd; launcher sets CC_MASTER_PLUGIN_ROOT from __dirname.
    - No ${PLUGIN_ROOT} / ${CLAUDE_PLUGIN_ROOT} assumed in Cursor (token unproven).
path_resolution:
  status: verified-basic
  verified_cursor: "3.10.20"
  verified:
    - Absolute command paths work (project + local plugin probes).
    - Local plugin hook cwd is the plugin install directory.
    - Hook child has node on PATH (D2).
    - Hook child env lacks CURSOR_*; use stdin conversation_id/session_id (D7/D8).
  production_strategy:
    - Register hooks with relative node ./hooks/_hosts/cursor/launcher.js paths.
    - Launcher resolves plugin root via path.resolve(__dirname, '..', '..', '..').
    - Default home is $HOME/.cc_master (aligned with ccm / Codex); CC_MASTER_HOME overrides.
    - Board discovery: session-state first, then unique active board-scan.
    - Inject CC_MASTER_PLUGIN_ROOT / CC_MASTER_HARNESS=cursor for cores.
payload_map:
  status: verified-basic
  verified_cursor: "3.10.20"
  fixtures:
    preToolUse:
      fields: [conversation_id, session_id, generation_id, hook_event_name, tool_name, tool_input, tool_use_id, cursor_version, workspace_roots, transcript_path]
    postToolUse:
      fields: [conversation_id, session_id, generation_id, hook_event_name, tool_name, tool_input, tool_output, duration, tool_use_id, cursor_version, workspace_roots, transcript_path]
  notes:
    - conversation_id == session_id in live fixtures; use as board owner.session_id.
    - Tool names: Shell | Write | Read (not Bash/Edit).
output_envelope:
  status: implemented
  ssot: ENVELOPE.md
  by_event:
    beforeSubmitPrompt:
      context_system: "{ continue: true, user_message }"
      block_deny: "{ continue: false, user_message }"
    postToolUse:
      context_system: "{ additional_context }"
    preToolUse:
      block_deny: "{ permission: deny, user_message }"
    stop:
      all_notify_kinds: "{ followup_message }"
  verified:
    - postToolUse additional_context reaches the model (D5 PASS on 3.10.20).
    - stop followup_message + loop_count + loop_limit documented (D6 docs).
  known_gaps:
    - sessionStart.additional_context staff-confirmed drop bug (D4 FAIL) — do not use for reinject.
    - sessionStart does not re-fire after compact (D3 FAIL).
    - preCompact cannot inject agent context — reinject core is silent no-op; alwaysApply rule carries role substrate.
    - stop followup_message auto-continues the agent; throttle via cooldown + verify-board loop_limit.
normalized_contract:
  env: ../../_shared/contract.md
  payload: ../../_shared/contract.md
  result: ../../_shared/contract.md
launcher:
  source: launcher.js
  status: implemented
  responsibilities:
    - parse Cursor hook stdin JSON
    - normalize to shared contract (harness: cursor)
    - inject CC_MASTER_* env for cores
    - map core result kinds to Cursor envelopes per ENVELOPE.md (user_message / followup_message / permission deny / additional_context)
hooks:
  bootstrap-board:
    event: beforeSubmitPrompt
    status: implemented-fresh-resume
  board-guard:
    event: preToolUse
    matcher: Shell|Write
    status: implemented-deny
  board-lint:
    event: postToolUse
    matcher: Write
    status: implemented-lint
  orchestrator-context:
    event: postToolUse
    status: implemented-track-b
    behavior: first cached ccm/origin-context-delivery/v1 plus content-hash deltas via additional_context; no sessionStart context claim
  verify-board:
    event: stop
    status: implemented-followup
    loop_limit: 5
  usage-pacing:
    event: stop
    status: implemented-followup-advisory
    behavior: cached ccm quota status only; cursor-ide-plugin and cursor-agent-cli stay distinct; no provider network, credential read, or account switch
  identity-nudge:
    event: stop
    status: implemented-followup-advisory
  reinject:
    event: preCompact
    status: implemented-track-b-silent
notes:
  - See design_docs/harnesses/cursor.md Probe Results + ADR-031 Track A/B.
  - Phase C replaces noop cores with CONTRACT-backed implementations.
