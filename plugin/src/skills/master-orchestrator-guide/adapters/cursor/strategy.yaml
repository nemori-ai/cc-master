  - Cursor projection uses the host-neutral canonical body plus Cursor Task/Shell dispatch and shell-floor watchdog slots.
  - Quota overlays teach billing_period only (no 5h/7d/account switch). Workflow remains unsupported.
  - Exclude cost-decisions.md and handoff.md like Codex; keep codex-review.sh excluded (optional external).
  - Heterogeneous second-perspective review is host-slot: Cursor picks another supported model family, not Codex-CLI-only.
