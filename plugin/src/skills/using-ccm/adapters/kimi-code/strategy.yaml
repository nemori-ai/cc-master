host: kimi-code
skill: using-ccm
version: 1
mode: copy
projection:
  source: canonical/
  target: skills/using-ccm/
runtime_contracts:
  provider_guidance:
    registry: ../provider-guidance-runtime.json
    host: kimi-code
    skill: using-ccm
exclude_canonical:
  - references/account-pool.md
unsupported:
  - capability: account_switch
    reason: "ccm account backend currently targets Claude Code OAuth credential stores; kimi returns NotImplemented."
  - capability: statusline_install
    reason: "kimi has no Claude-style external statusline hook; statusline install/uninstall is NotImplemented."
supported:
  - capability: board_operations
    reason: "ccm board/task/log/jc/cadence/watchdog commands are harness-neutral."
  - capability: plugin_upgrade
    reason: "ccm upgrade plugin may refresh local kimi plugin registration from plugin/dist/kimi-code (managed-dir reinstall) when the kimi upgrade adapter is available; otherwise manual reinstall."
  - capability: plugin_skills_distribution
    reason: "kimi command-like入口与 hooks 通过 plugin skills + host-native manifest commands 实现。"
  - capability: current_quota_signal
    reason: "ccm reads Kimi current-login rolling 5h/7d windows through kimi-usages-api; expired stored OAuth may be auto-refreshed under a lock."
slot_replacements:
  "{{USING_CCM_DESCRIPTION}}": adapters/kimi-code/overlays/description.md
  "{{USING_CCM_BOUNDARY}}": adapters/kimi-code/overlays/boundary.md
  "{{USING_CCM_POINTERS_HOST}}": adapters/kimi-code/overlays/pointers-host.md
  "{{USING_CCM_EXECUTOR_TABLE_ROWS}}": adapters/kimi-code/overlays/executor-table-rows.md
  "{{USING_CCM_EXECUTOR_DECISION_TAIL}}": adapters/kimi-code/overlays/executor-decision-tail.md
  "{{USING_CCM_WATCHDOG_PROBLEM}}": adapters/kimi-code/overlays/watchdog-problem.md
  "{{USING_CCM_WATCHDOG_HOOK_REMINDER}}": adapters/kimi-code/overlays/watchdog-hook-reminder.md
  "{{USING_CCM_WATCHDOG_MECHANISM_ROWS}}": adapters/kimi-code/overlays/watchdog-mechanism-rows.md
  "{{USING_CCM_WATCHDOG_SHELL_GUIDANCE}}": adapters/kimi-code/overlays/watchdog-shell-guidance.md
  "{{USING_CCM_WATCHDOG_CANCEL_GUIDANCE}}": adapters/kimi-code/overlays/watchdog-cancel-guidance.md
