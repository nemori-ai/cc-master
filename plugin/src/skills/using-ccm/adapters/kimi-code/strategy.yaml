  "{{USING_CCM_ACCOUNT_NAMESPACE}}": adapters/kimi-code/overlays/account-namespace.md
  "{{USING_CCM_STATUSLINE_NAMESPACE}}": adapters/kimi-code/overlays/statusline-namespace.md
  "{{USING_CCM_STATUSLINE_NAMESPACE_ROW}}": adapters/kimi-code/overlays/statusline-namespace-row.md
