host: codex
skill: pacing-and-estimation
version: 1
mode: copy
projection:
  source: canonical/
  target: skills/pacing-and-estimation/
runtime_contracts:
  read_only_capability:
    registry: read-only-capability.json
    slot: "{{PACING_READ_ONLY_CAPABILITY}}"
    host: codex
  provider_guidance:
    registry: ../provider-guidance-runtime.json
    host: codex
    skill: pacing-and-estimation
unsupported:
  - capability: account_switch_pacing
    reason: "Codex automatic account switching is permanently forbidden."
  - capability: statusline_sidecar
    reason: "Claude Code statusline sidecar does not exist in Codex adapter."
supported:
  - capability: model_tier_provider
    reason: "OpenAI/Codex GPT-5.6 Sol/Terra/Luna × reasoning-effort availability, capability, and relative-cost facts are projected into the model registry; allocation remains with master-orchestrator-guide."
  - capability: current_quota_signal
    reason: "ccm usage show/advise reads Codex current-account 7d facts via `codex app-server --stdio` account/rateLimits/read; rolling-24h is advisory and any 5h field is ignored provenance."
  - capability: estimation_method
    reason: "Cost-to-complete estimation method is host-neutral when it consumes normalized board data."
slot_replacements:
  "{{PACING_DESCRIPTION}}": adapters/codex/overlays/description.md
  "{{PACING_MODEL_TIERS_REFERENCE}}": adapters/codex/overlays/model-tiers-reference.md
  "{{PACING_USAGE_SIGNALS_REFERENCE}}": adapters/codex/overlays/usage-signals-reference.md
  "{{PACING_LEVERS_REFERENCE}}": adapters/codex/overlays/levers-reference.md
notes:
  - Codex projects the closed read-only capability block plus host-specific usage/model facts.
  - model-tiers.md maps GPT-5.6 family × effort from official OpenAI benchmark, Codex model, pricing, and availability guidance.
