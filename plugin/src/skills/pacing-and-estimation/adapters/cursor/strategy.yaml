host: cursor
skill: pacing-and-estimation
version: 1
mode: copy
projection:
  source: canonical/
  target: skills/pacing-and-estimation/
runtime_contracts:
  read_only_capability:
    registry: read-only-capability.json
    slot: "{{PACING_READ_ONLY_CAPABILITY}}"
    host: cursor
  provider_guidance:
    registry: ../provider-guidance-runtime.json
    host: cursor
    skill: pacing-and-estimation
  model_admission:
    source: adapters/cursor/overlays/model-tiers-reference.md
    target: references/model-tiers.md
unsupported:
  - capability: account_switch_pacing
    reason: "Cursor automatic account switching is permanently forbidden; no switch verdict."
  - capability: statusline_sidecar
    reason: "Claude Code statusline sidecar does not exist in Cursor adapter; usage from cursor-dashboard."
supported:
  - capability: current_quota_signal
    reason: "ccm usage show/advise reads Cursor billing_period (~30d) via dashboard GetCurrentPeriodUsage (source: cursor-dashboard)."
  - capability: estimation_method
    reason: "Cost-to-complete estimation method is host-neutral when it consumes normalized board data."
  - capability: model_tier_provider
    reason: "Cursor model guidance is plan/payer-qualified; real model tests admit only freshly cataloged Auto/Composer 2.5/Grok 4.5 first-party selectors and never auto-fallback to API."
slot_replacements:
  "{{PACING_DESCRIPTION}}": adapters/cursor/overlays/description.md
  "{{PACING_MODEL_TIERS_REFERENCE}}": adapters/cursor/overlays/model-tiers-reference.md
  "{{PACING_USAGE_SIGNALS_REFERENCE}}": adapters/cursor/overlays/usage-signals-reference.md
  "{{PACING_LEVERS_REFERENCE}}": adapters/cursor/overlays/levers-reference.md
notes:
  - Cursor projects the closed read-only capability block plus billing_period and plan-qualified model facts; real model tests are first-party-only.
