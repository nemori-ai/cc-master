# cc-master SAP strategy: Claude Code adapter for pacing-and-estimation
host: claude-code
skill: pacing-and-estimation
version: 1
projection:
  source: canonical/
  target: skills/pacing-and-estimation/
  copy: true
  exclude:
    - AGENTS.md
    - CLAUDE.md
runtime_contracts:
  read_only_capability:
    registry: read-only-capability.json
    slot: "{{PACING_READ_ONLY_CAPABILITY}}"
    host: claude-code
slot_replacements:
  "{{PACING_DESCRIPTION}}": adapters/claude-code/overlays/description.md
  "{{PACING_MODEL_TIERS_REFERENCE}}": adapters/claude-code/overlays/model-tiers-reference.md
  "{{PACING_USAGE_SIGNALS_REFERENCE}}": adapters/claude-code/overlays/usage-signals-reference.md
  "{{PACING_LEVERS_REFERENCE}}": adapters/claude-code/overlays/levers-reference.md
mechanisms:
  declarative-patch:
    enabled: false
    patches: []
notes:
  - Claude Code projects the closed read-only capability block plus host-localized fact references.
