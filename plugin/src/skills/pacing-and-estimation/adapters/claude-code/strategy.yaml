# cc-master SAP strategy: Claude Code adapter for pacing-and-estimation
host: claude-code
skill: pacing-and-estimation
version: 1
projection:
  source: canonical/
  target: skills/pacing-and-estimation/
  copy: true
  exclude:
    - AGENTS.md
    - CLAUDE.md
runtime_contracts:
  read_only_capability:
    registry: read-only-capability.json
    slot: "{{PACING_READ_ONLY_CAPABILITY}}"
    host: claude-code
  provider_guidance:
    registry: ../provider-guidance-runtime.json
    host: claude-code
    skill: pacing-and-estimation
slot_replacements:
  "{{PACING_DESCRIPTION}}": adapters/claude-code/overlays/description.md
  "{{CROSS_HARNESS_ACTIVE_QUERY_POINTER}}": adapters/claude-code/overlays/cross-harness-active-query-pointer.md
mechanisms:
  declarative-patch:
    enabled: false
    patches: []
notes:
  - Claude Code projects the closed read-only capability block; machine-wide quota consumption is canonical for every origin.
