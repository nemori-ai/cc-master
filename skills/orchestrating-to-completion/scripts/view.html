        return analyze(board.tasks, board.owner);
      }, [board]);
      const anRef = useRef(null);
      anRef.current = an;
      boardRef.current = board;
      selRef.current = sel;

      // (re)render the graph from current board + analysis + selection
      const render = useCallback((b, analysis, selection, fresh) => {
        const { nodes: nn, edges: ee, positions } =
          buildGraph(b, analysis, selection, fresh ? null : posRef.current, fresh);
        if (fresh) posRef.current = positions;
        setNodes(nn);
        setEdges(ee);
      }, []);

      // flip day/night — set the root attribute, invalidate the cssVar cache so
      // edges/spine/minimap re-resolve, persist, and re-render the graph in place
      // (fresh=false → keep dagre positions, keep selection, keep poll state; we
      // only restyle, never re-layout). The CSS [data-theme] block restyles the
      // rest; the graph rebuild repaints the JS-resolved edge strokes.
      const toggleTheme = useCallback(() => {
        const next = currentTheme() === 'light' ? 'dark' : 'light';
        applyThemeAttr(next);
        clearCssCache();
        try { localStorage.setItem(THEME_KEY, next); } catch (_e) {}
        setTheme(next);
        const b = boardRef.current, a = anRef.current;
        if (b && a) render(b, a, selRef.current, false);
      }, [render]);

      const apply = useCallback((b) => {
        const sig = structSig(b);
        const analysis = analyze(b.tasks, b.owner);
        const fresh = sig !== sigRef.current;
        if (fresh) sigRef.current = sig;
        // keep selection only if the node still exists
        let s = selRef.current;
        if (s && !analysis.byId.has(s)) s = null;
        render(b, analysis, s, fresh);
        if (s !== selRef.current) setSel(s);
        if (fresh) {
          // re-fit on every topology change (nodes added/removed) — on a live
          // 2s-polling viewer, newly dispatched nodes must not land off-screen.
          // structSig is topology-only, so status-only polls aren't `fresh` and
          // won't fight the user's manual pan/zoom mid-status-update.
          didFit.current = true;
          setTimeout(() => rf.fitView({ padding: 0.16 }), 30);
        }
        setBoard(b);
      }, [rf, render]);

      useEffect(() => {
        let alive = true;
        async function poll() {
          try {
            const r = await fetch('/board.json', { cache: 'no-store' });
            if (!alive) return;
            if (!r.ok) { return; } // mid-write -> skip this tick, keep last good render
            const b = await r.json();
            if (!alive) return;
            setErr(null);
            apply(b);
          } catch (_e) { /* transient -> retry next tick */ }
        }
        poll();
        const iv = setInterval(poll, 2000);
        return () => { alive = false; clearInterval(iv); };
      }, [apply]);

      // selection handlers — re-render graph (lineage) without re-layout
      const select = useCallback((id) => {
        setSel(id);
        const b = boardRef.current, a = anRef.current;
        if (b && a) render(b, a, id, false);
      }, [render]);

      const onNodeClick = useCallback((_e, node) => { select(node.id); }, [select]);
      const onPaneClick = useCallback(() => { select(null); }, [select]);

      const progress = useMemo(() => {
        const tasks = (board && Array.isArray(board.tasks)) ? board.tasks : [];
        const done = tasks.filter(t => DONE_STATUSES.has(t.status)).length;
        return { done, total: tasks.length };
      }, [board]);

      const counts = useMemo(() => {
        const tasks = (board && Array.isArray(board.tasks)) ? board.tasks : [];
        const c = {};
        for (const t of tasks) c[t.status] = (c[t.status] || 0) + 1;
        return c;
      }, [board]);

      const pct = progress.total ? Math.round((progress.done / progress.total) * 100) : 0;
      const branch = board && board.git && board.git.branch ? board.git.branch : null;
      const userGates = an ? an.userGateIds.length : 0;
      const nodeCount = progress.total;

      const selTask = (board && sel) ? (board.tasks || []).find(t => t.id === sel) : null;

      return h('div', { id: 'app' },
        h('header', { className: 'bar' },
          // identity nameplate
          h('div', { className: 'ident' },
            h('span', { className: 'beacon' }),
            h('div', { className: 'mark-wrap' },
              h('span', { className: 'mark' }, 'cc-master'),
              h('span', { className: 'sub' }, 'mission control'),
            ),
          ),
          // mission line
          h('div', { className: 'goalwrap' },
            h('span', { className: 'label' }, 'objective'),
            h('span', { className: 'goal', title: board ? board.goal : '' },
              board ? (board.goal || 'no goal set') : 'acquiring board…'),
          ),
          // telemetry readouts
          h('div', { className: 'readouts' },
            // view toggle — GRAPH (xyflow DAG) | LIST (status-board)
            h('div', { className: 'viewtoggle', role: 'group', 'aria-label': 'view mode' },
              h('button', {
                type: 'button',
                className: view === 'graph' ? 'on' : '',
                'aria-pressed': view === 'graph',
                title: 'graph view — the dependency DAG',
                onClick: () => setViewPersist('graph'),
              }, h('span', { className: 'tg' }, '⬡'), 'graph'),
              h('button', {
                type: 'button',
                className: view === 'list' ? 'on' : '',
                'aria-pressed': view === 'list',
                title: 'list view — the status-board',
                onClick: () => setViewPersist('list'),
              }, h('span', { className: 'tg' }, '☰'), 'list'),
            ),
            // day/night toggle — single icon button; glyph shows the DESTINATION
            // (☀ when dark → click for day; ☾ when light → click for night).
            // aria-pressed reflects "light theme is on".
            h('button', {
              type: 'button',
              className: 'themetoggle',
              'aria-pressed': theme === 'light',
              'aria-label': theme === 'light'
                ? 'switch to night (dark) theme'
                : 'switch to day (light) theme',
              title: theme === 'light' ? 'night theme' : 'day theme',
              onClick: toggleTheme,
            }, h('span', { className: 'glyph', 'aria-hidden': 'true' }, theme === 'light' ? '☾' : '☀')),
            h('div', { className: 'vrule' }),
            h('div', { className: 'readout' },
              h('span', { className: 'rl' }, 'progress'),
              h('span', { className: 'rv' },
                progress.done, h('span', { className: 'unit' }, '/' + progress.total),
                h('span', { className: 'unit' }, '  ' + pct + '%'),
              ),
              h('div', { className: 'meter' }, h('i', { style: { width: pct + '%' } })),
            ),
            branch ? h('div', { className: 'vrule' }) : null,
            branch ? h('div', { className: 'readout branch' },
              h('span', { className: 'rl' }, 'branch'),
              h('span', { className: 'rv' }, branch),
            ) : null,
            userGates > 0 ? h('div', { className: 'vrule' }) : null,
            userGates > 0 ? h('div', { className: 'alarm' },
              h('span', { className: 'dot' }),
              h('span', { className: 'n' }, userGates),
              'awaiting you',
            ) : null,
          ),
        ),
        h('div', { id: 'stage' },
          // left analytics rail
          h(Insights, { an, board, progress, pct, nodeCount, onPick: select }),
          // center: LIST view (status-board) — same live board, same analyze(),
          // same select(); replaces the canvas while keeping rails intact.
          view === 'list' ? h(ListView, {
            an, board, progress, pct, sel, onPick: select,
          }) : null,
          // center canvas — GRAPH view. Kept mounted only in graph mode so xyflow
          // doesn't measure/animate while hidden; nodes/edges state still updates.
          view === 'graph' ? h('div', { id: 'flow', className: sel ? 'has-selection' : '' },
            err ? h('div', { className: 'err' }, err) : null,
            h(ReactFlow, {
              nodes, edges, nodeTypes,
              fitView: true,
              minZoom: 0.1,
              proOptions: { hideAttribution: true },
              nodesDraggable: true,
              nodesConnectable: false,
              elementsSelectable: true,
              onNodeClick,
              onPaneClick,
              defaultEdgeOptions: { type: 'smoothstep' },
            },
              h(Background, {
                variant: BackgroundVariant.Dots,
                gap: 22, size: 1, color: cssVar('--grid'),
              }),
              h(Controls, { showInteractive: false }),
              // MiniMap: only worth showing on larger graphs — below ~10 nodes it
              // adds nothing but a tiny dark inset. Auto-hide under the threshold.
              nodeCount > 10 ? h(MiniMap, {
                // keyed on theme so a switch remounts it with fresh colors
                key: 'mm-' + theme,
                pannable: true, zoomable: true,
                // bg / mask / stroke from the concrete --mm-* tokens (plain
                // hex/rgba — these DO resolve, unlike the oklch lamp vars), so
                // the minimap tracks day/night too.
                bgColor: cssVar('--mm-bg'),
                maskColor: cssVar('--mm-mask'),
                // CONCRETE solid colors per status — the minimap SVG does NOT
                // resolve our oklch()/CSS-var lamps, so a var lookup leaves the
                // rects unfilled (the empty-dark-box bug). Plain hex fills it;
                // minimapColor is keyed on the active theme.
                nodeColor: (n) => minimapColor(n.data && n.data.status),
                nodeStrokeColor: cssVar('--mm-stroke'),
                nodeStrokeWidth: 3,
                nodeBorderRadius: 3,
              }) : null,
            ),
            h(Legend, { counts, total: progress.total }),
          ) : null,
          // right detail rail (slides in on selection)
          h(Detail, { task: selTask, an, board, onClose: () => select(null), onPick: select }),
        ),
      );
    }

    // ---- INSIGHTS RAIL — derived analytics readout -------------------------
    function Insights({ an, board, progress, pct, nodeCount, onPick }) {
      if (!an || !board) {
        return h('div', { id: 'insights' },
          h('div', { className: 'ihead' }, 'analysis'),
          h('div', { className: 'metric' },
            h('div', { className: 'mv dim' }, 'acquiring board…')),
        );
      }
      const idTitle = (id) => {
        const t = an.byId.get(id);
        const ti = t && (t.title || '').trim();
        return ti || id;
      };
      const seg = (id) => h('span', {
        className: 'seg', key: id, onClick: () => onPick(id), title: idTitle(id),
      }, id);

      const overWip = (typeof board.wip_limit === 'number') && an.wip > board.wip_limit;

      const rows = [];

      // critical path
      rows.push(h('div', { className: 'metric', key: 'cp' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '⟋'), 'critical path'),
        an.critChain.length
          ? h('div', { className: 'chain' },
              an.critChain.flatMap((id, i) =>
                i === 0 ? [seg(id)] : [h('span', { className: 'arrow', key: 'a' + i }, '→'), seg(id)]))
          : h('div', { className: 'mv dim' }, '—'),
        h('div', { className: 'msub' }, 'length ' + an.critLen + ' · longest dependency chain'),
      ));

      // highest impact
      rows.push(h('div', { className: 'metric', key: 'imp' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '◈'), 'highest impact'),
        an.impactNode && an.impactMax > 0
          ? h('div', { className: 'mv' },
              h('span', { className: 'pill-id', onClick: () => onPick(an.impactNode) }, an.impactNode),
              '  ', idTitle(an.impactNode))
          : h('div', { className: 'mv dim' }, 'no node gates others'),
        an.impactMax > 0 ? h('div', { className: 'msub' }, 'gates ' + an.impactMax + ' downstream tasks') : null,
      ));

      // top convergence
      rows.push(h('div', { className: 'metric', key: 'conv' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '⋈'), 'top convergence'),
        an.convNode && an.convMax >= CONV_MIN
          ? h('div', { className: 'mv' },
              h('span', { className: 'pill-id', onClick: () => onPick(an.convNode) }, an.convNode),
              '  ', idTitle(an.convNode))
          : h('div', { className: 'mv dim' }, 'no multi-dep join'),
        an.convMax >= CONV_MIN ? h('div', { className: 'msub' }, an.convMax + ' dependencies aggregate here') : null,
      ));

      // bottleneck
      const bt = an.bneck ? an.byId.get(an.bneck) : null;
      const btDur = bt ? fmtDuration(taskDuration(bt)) : null;
      rows.push(h('div', { className: 'metric flag', key: 'bn' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '⚠'), 'bottleneck'),
        bt
          ? h('div', { className: 'mv' },
              h('span', { className: 'pill-id', onClick: () => onPick(an.bneck) }, an.bneck),
              '  ', idTitle(an.bneck))
          : h('div', { className: 'mv dim' }, 'none — nothing stalling'),
        bt ? h('div', { className: 'msub' },
          (STATUS_LABEL[bt.status] || bt.status)
          + (an.impact.get(an.bneck) > 0 ? ' · gates ' + an.impact.get(an.bneck) : '')
          + (btDur != null ? ' · ' + btDur : '')) : null,
      ));

      // WIP
      const wipLimit = (typeof board.wip_limit === 'number') ? board.wip_limit : null;
      rows.push(h('div', { className: 'metric' + (overWip ? ' warnwip' : ''), key: 'wip' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '≡'), 'work in flight'),
        h('div', { className: 'mv mono' },
          an.wip + (wipLimit != null ? ' / ' + wipLimit : '') + (overWip ? '  ⚠ over' : '')),
        h('div', { className: 'msub' }, wipLimit != null ? 'in_flight vs wip_limit' : 'in_flight (no wip_limit set)'),
      ));

      // awaiting user
      rows.push(h('div', { className: 'metric' + (an.userGateIds.length ? ' flag' : ''), key: 'au' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '◴'), 'awaiting user'),
        h('div', { className: 'mv mono' }, String(an.userGateIds.length)),
        (an.userGateIds.length && fmtElapsed(an.earliestGateElapsedMs) != null)
          ? h('div', { className: 'msub' }, 'oldest gate ' + fmtElapsed(an.earliestGateElapsedMs) + ' waiting')
          : h('div', { className: 'msub' }, 'human decisions pending'),
      ));

      // overall elapsed
      rows.push(h('div', { className: 'metric', key: 'el' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '◷'), 'orchestration age'),
        h('div', { className: 'mv mono' }, an.totalElapsedMs != null ? fmtElapsed(an.totalElapsedMs) : '—'),
        h('div', { className: 'msub' }, progress.done + '/' + progress.total + ' done · ' + pct + '%'),
      ));

      return h('div', { id: 'insights' },
        h('div', { className: 'ihead' }, 'analysis · ' + nodeCount + ' tasks'),
        ...rows,
      );
    }

    function msFromDispatch(t) {
      const ts = parseTs(t.dispatched_at);
      return ts != null ? Date.now() - ts : null;
    }

    // ---- LIST VIEW — the status-board (TUI status-board's web twin) --------
    // Same live board + analyze() + select() as the DAG; a scannable, status-
    // grouped column. Sections in a fixed priority order, EMPTY ones omitted:
    //   AWAITING YOU (top, most prominent) → IN FLIGHT → BLOCKED → READY
    //   → DONE/VERIFIED → NEEDS ATTENTION.
    // Within each section, rows sort by downstream impact (criticality) desc so
    // the heaviest items float up. Each row earns the graph's analytics in list
    // form: gates N / ⋈ N fan-in / ⟋ critical / ⚠ bottleneck chips.
    const NEEDS_ATTN = new Set(['stale', 'failed', 'escalated', 'uncertain']);
    function ListView({ an, board, progress, pct, sel, onPick }) {
      if (!an || !board) {
        return h('div', { id: 'listview' },
          h('div', { className: 'lvempty' }, 'acquiring board…'));
      }
      const tasks = Array.isArray(board.tasks) ? board.tasks : [];

      // partition into sections. AWAITING-YOU pulls ANY blocked_on:'user' task
      // out FIRST (regardless of status) so a user gate is never buried; the
      // remaining sections are status-driven and mutually exclusive with it.
      const gateIds = new Set(an.userGateIds);
      const buckets = {
        gate: [], in_flight: [], blocked: [], ready: [], done: [], attn: [],
      };
      for (const t of tasks) {
        if (gateIds.has(t.id)) { buckets.gate.push(t); continue; }
        const s = t.status;
        if (s === 'in_flight') buckets.in_flight.push(t);
        else if (s === 'blocked') buckets.blocked.push(t);
        else if (s === 'ready') buckets.ready.push(t);
        else if (DONE_STATUSES.has(s)) buckets.done.push(t);
        else if (NEEDS_ATTN.has(s)) buckets.attn.push(t);
        else buckets.attn.push(t); // unknown statuses surface, never vanish
      }
      // sort each bucket by downstream impact desc (criticality), id as tiebreak
      const byImpact = (a, b) =>
        (an.impact.get(b.id) || 0) - (an.impact.get(a.id) || 0) ||
        String(a.id).localeCompare(String(b.id));
      for (const k of Object.keys(buckets)) buckets[k].sort(byImpact);

      // section descriptors, in render order
      const SECTIONS = [
        { key: 'gate',      cls: 'gate', icon: '⏸', name: 'awaiting you',     kind: 'gate' },
        { key: 'in_flight', cls: '',     icon: '▶', name: 'in flight',        kind: 'inflight' },
        { key: 'blocked',   cls: '',     icon: '⛔', name: 'blocked',          kind: 'blocked' },
        { key: 'ready',     cls: '',     icon: '◷', name: 'ready',            kind: 'ready' },
        { key: 'done',      cls: '',     icon: '✓', name: 'done / verified',  kind: 'done' },
        { key: 'attn',      cls: '',     icon: '⚠', name: 'needs attention',  kind: 'attn' },
      ];

      const sections = SECTIONS.filter(s => buckets[s.key].length).map(s =>
        h('div', { className: 'lvsect ' + s.cls, key: s.key },
          h('div', { className: 'shead' },
            h('span', { className: 'sic' }, s.icon),
            h('span', { className: 'snm' }, s.name),
            h('span', { className: 'scount' }, buckets[s.key].length),
            h('span', { className: 'srule' }),
          ),
          ...buckets[s.key].map(t => h(ListRow, {
            key: t.id, task: t, an, kind: s.kind,
            selected: t.id === sel, onPick,
          })),
        ),
      );

      const userGates = an.userGateIds.length;

      return h('div', { id: 'listview' },
        // condensed insights strip — mirrors the rail, one horizontal line
        h('div', { className: 'lvstrip' },
          h('div', { className: 'si grow' },
            h('span', { className: 'sl' }, 'objective'),
            h('span', { className: 'sv', title: board.goal || '' }, board.goal || 'no goal set'),
          ),
          h('div', { className: 'si' },
            h('span', { className: 'sl' }, 'progress'),
            h('span', { className: 'sv' }, progress.done + '/' + progress.total + ' · ' + pct + '%'),
          ),
          h('div', { className: 'si' },
            h('span', { className: 'sl' }, 'critical path'),
            h('span', { className: 'sv' }, String(an.critLen)),
          ),
          h('div', { className: 'si' },
            h('span', { className: 'sl' }, 'wip'),
            h('span', { className: 'sv' }, String(an.wip)),
          ),
          h('div', { className: 'si' + (userGates ? ' flag' : '') },
            h('span', { className: 'sl' }, 'awaiting you'),
            h('span', { className: 'sv' }, String(userGates)),
          ),
        ),
        sections.length ? sections : h('div', { className: 'lvempty' }, 'no tasks on the board'),
      );
    }

    // a single list row — its own component so the in_flight clock can tick via
    // useSecondTick scoped to exactly the rows that need it.
    function ListRow({ task: t, an, kind, selected, onPick }) {
      const status = t.status;
      const userGate = isAwaitingUser(t);
      // live clock: in_flight (or any user-gate row dispatched & running) ticks.
      const running = status === 'in_flight' && parseTs(t.dispatched_at) != null;
      useSecondTick(running);

      const cls = ['lvrow', 's-' + (status || 'unknown')];
      if (userGate) cls.push('usergate');
      if (selected) cls.push('sel');
      const lamp = userGate ? cssVar('--alert') : statusColor(status);

      // ---- per-status detail line --------------------------------------------
      const parts = [];
      if (userGate) {
        const elStr = fmtElapsed(msFromDispatch(t));
        parts.push(h('span', { className: 'dpart gate', key: 'g' },
          h('span', { className: 'dk' }, 'gate'),
          'awaiting your decision' + (elStr != null ? ' · ' + elStr : '')));
      }
      if (kind === 'inflight' || running) {
        if (running) {
          const elapsed = Date.now() - parseTs(t.dispatched_at);
          const clk = fmtElapsed(elapsed);
          if (clk != null) parts.push(h('span', { className: 'dpart clk', key: 'clk' },
            h('span', { className: 'cglyph' }, '◷'), 'running ' + clk));
        }
        if (t.mechanism) parts.push(h('span', { className: 'dpart', key: 'mech' },
          h('span', { className: 'dk' }, 'via'), t.mechanism + (t.handle ? ' · ' + t.handle : '')));
      } else if (kind === 'blocked' && !userGate) {
        const deps = an.upstream.get(t.id) || [];
        const blockers = deps.filter(d => {
          const dt = an.byId.get(d);
          return dt && !DONE_STATUSES.has(dt.status);
        });
        const showDeps = blockers.length ? blockers : deps;
        if (t.blocked_on && t.blocked_on !== 'user') {
          parts.push(h('span', { className: 'dpart bon', key: 'bon' },
            h('span', { className: 'dk' }, 'blocked on'), String(t.blocked_on)));
        } else if (showDeps.length) {
          parts.push(h('span', { className: 'dpart bon', key: 'bon' },
            h('span', { className: 'dk' }, 'blocked on'), showDeps.join(', ')));
        }
      } else if (kind === 'done') {
        const dur = taskDuration(t);
        const durStr = fmtDuration(dur);
        if (durStr != null) parts.push(h('span', { className: 'dpart', key: 'dur' },
          h('span', { className: 'dk' }, 'took'), durStr));
        if (t.artifact) parts.push(h('span', { className: 'dpart art', key: 'art' },
          h('span', { className: 'dk' }, 'artifact'), String(t.artifact)));
      } else if (kind === 'attn') {
        const elStr = fmtElapsed(msFromDispatch(t));
        parts.push(h('span', { className: 'dpart bon', key: 'st' },
          h('span', { className: 'dk' }, 'status'),
          (STATUS_LABEL[status] || status) + (elStr != null ? ' · ' + elStr : '')));
      }

      // ---- structural chips (right cluster) ----------------------------------
      const impact = an.impact.get(t.id) || 0;
      const inDeg = an.inDeg.get(t.id) || 0;
      const chips = [];
      if (an.critSet.has(t.id)) chips.push(
        h('span', { className: 'lchip crit', key: 'cr', title: 'on the critical path' }, '⟋ crit'));
      if (an.bneck === t.id) chips.push(
        h('span', { className: 'lchip bneck', key: 'bn', title: 'bottleneck — stalling the most work' }, '⚠ bottleneck'));
      if (impact > 0) chips.push(
        h('span', { className: 'lchip impact' + (impact >= IMPACT_HOT ? ' hot' : ''), key: 'imp',
          title: 'gates ' + impact + ' downstream tasks' },
          'gates', h('span', { className: 'cn' }, impact)));
      if (inDeg >= CONV_MIN) chips.push(
        h('span', { className: 'lchip conv', key: 'cv', title: 'convergence — ' + inDeg + ' direct deps' },
          '⋈', h('span', { className: 'cn' }, inDeg)));

      const title = (t.title || '').trim();

      return h('div', {
        className: cls.join(' '),
        onClick: () => onPick(t.id),
        style: { '--lamp': lamp },
      },
        h('span', { className: 'lamp', style: { background: lamp, color: lamp } }),
        h('div', { className: 'body' },
          h('div', { className: 'line1' },
            h('span', { className: 'rid' }, t.id),
            h('span', { className: 'rtitle' + (title ? '' : ' empty') }, title || 'untitled'),
          ),
          parts.length ? h('div', { className: 'detailline' }, ...parts) : null,
        ),
        chips.length ? h('div', { className: 'chips' }, ...chips) : null,
      );
    }

    // ---- DETAIL RAIL — full task readout -----------------------------------
    function Detail({ task, an, board, onClose, onPick }) {
      const open = !!task;
      const lamp = task ? statusColor(task.status) : 'transparent';

      const body = [];
      if (task && an) {
        const id = task.id;
        const title = (task.title || '').trim();
        const isCrit = an.critSet.has(id);
        const isBneck = an.bneck === id;
        // awaiting-user = blocked_on:'user' AND pending status (mirrors the tile
        // + analyze via isAwaitingUser); a terminal task's stale gate doesn't count.
        const userGate = isAwaitingUser(task);

        // badges
        const badges = [];
        if (isCrit) badges.push(h('span', { className: 'badge crit', key: 'b1' }, '⟋ critical path'));
        if (isBneck) badges.push(h('span', { className: 'badge bneck', key: 'b2' }, '⚠ bottleneck'));
        if (task.verified === true) badges.push(h('span', { className: 'badge verified', key: 'b3' }, '✓ verified'));
        if (badges.length) body.push(h('div', { className: 'dsect', key: 'badges' },
          h('div', { className: 'badge-row' }, ...badges)));

        // identity
        const idRows = [];
        const addRow = (k, v, mono) => {
          if (v == null || v === '') return;
          idRows.push(h('div', { className: 'row', key: k },
            h('span', { className: 'k' }, k),
            h('span', { className: 'v' + (mono ? ' mono' : '') }, v)));
        };
        addRow('kind', task.kind);
        addRow('mechanism', task.mechanism, true);
        addRow('handle', task.handle, true);
        addRow('impact', (an.impact.get(id) || 0) + ' downstream', false);
        addRow('fan-in', (an.inDeg.get(id) || 0) + ' direct deps', false);
        if (idRows.length) body.push(h('div', { className: 'dsect', key: 'ident' },
          h('div', { className: 'sl' }, 'identity'),
          h('div', { className: 'kv' }, ...idRows)));

        // WHY — the headline
        const whyBits = [];
        if (task.justification) whyBits.push(
          h('div', { className: 'why-text', key: 'just' }, task.justification));
        if (task.dep_pins && typeof task.dep_pins === 'object') {
          const pins = Object.entries(task.dep_pins);
          if (pins.length) whyBits.push(h('div', { className: 'kv', key: 'pins', style: { marginTop: '10px' } },
            ...pins.map(([k, v]) => h('div', { className: 'row', key: k },
              h('span', { className: 'k' }, 'pin ' + k),
              h('span', { className: 'v mono' }, String(v))))));
        }

        // dependencies (upstream, by title + status)
        const deps = (an.upstream.get(id) || []);
        const depList = deps.length
          ? h('div', { className: 'deplist' }, ...deps.map(d => depItem(d, an, onPick)))
          : h('div', { className: 'deplist' }, h('div', { className: 'empty' }, 'no upstream dependencies — a root task'));

        // dependents (downstream — direct + transitive count)
        const directDown = (an.downstream.get(id) || []);
        const allDown = an.descendants(id, new Set());
        const transOnly = [...allDown].filter(x => !directDown.includes(x));
        const downBits = [];
        if (directDown.length) {
          downBits.push(h('div', { className: 'deplist', key: 'dd' },
            ...directDown.map(d => depItem(d, an, onPick))));
          if (transOnly.length) {
            downBits.push(h('div', { className: 'transitive-head', key: 'th' },
              '+ ' + transOnly.length + ' transitive'));
          }
        } else {
          downBits.push(h('div', { className: 'deplist', key: 'de' },
            h('div', { className: 'empty' }, 'gates nothing — a leaf task')));
        }

        body.push(h('div', { className: 'dsect why', key: 'why' },
          h('div', { className: 'sl' }, '◆ why this exists'),
          whyBits.length ? whyBits : h('div', { className: 'mv dim', style: { fontSize: '11.5px', color: 'var(--ink-faint)' } }, 'no justification recorded'),
        ));

        body.push(h('div', { className: 'dsect', key: 'deps' },
          h('div', { className: 'sl' }, 'waiting on'),
          depList,
        ));

        body.push(h('div', { className: 'dsect', key: 'blocks' },
          h('div', { className: 'sl' }, 'this blocks'),
          ...downBits,
        ));

        // telemetry
        const teleRows = [];
        const addTele = (k, v, mono) => {
          if (v == null || v === '') return;
          teleRows.push(h('div', { className: 'row', key: k },
            h('span', { className: 'k' }, k),
            h('span', { className: 'v' + (mono ? ' mono' : '') }, v)));
        };
        addTele('dispatched', task.dispatched_at, true);
        addTele('completed', task.completed_at, true);
        const elStr = fmtElapsed(msFromDispatch(task));
        if (elStr != null) addTele('elapsed', elStr, true);
        // execution time — how long the task ran (live) or took (settled).
        const dur = taskDuration(task);
        const durStr = fmtDuration(dur);
        if (durStr != null) addTele(dur && dur.running ? 'runtime' : 'duration', durStr, true);
        // human-in-the-loop cost: how many user-decision rounds this task cycled through.
        if (typeof task.hitl_rounds === 'number' && task.hitl_rounds > 0) addTele('hitl rounds', String(task.hitl_rounds), true);
        if (userGate) {
          addTele('awaiting', 'user' + (elStr != null ? ' · ' + elStr : ''), false);
        } else if (task.blocked_on && task.blocked_on !== 'user') {
          addTele('blocked on', task.blocked_on, true);
        }
        addTele('verified', task.verified === true ? 'yes' : (task.verified === false ? 'no' : null), false);
        if (teleRows.length) body.push(h('div', { className: 'dsect', key: 'tele' },
          h('div', { className: 'sl' }, 'telemetry'),
          h('div', { className: 'kv' }, ...teleRows)));

        // artifact
        if (task.artifact) body.push(h('div', { className: 'dsect', key: 'art' },
          h('div', { className: 'sl' }, 'artifact'),
          h('div', { className: 'artifact-box' }, String(task.artifact))));

        // activity (log + notes)
        const logs = Array.isArray(task.log) ? task.log : [];
        const activityBits = [];
        if (task.notes) activityBits.push(h('div', { className: 'le', key: 'note', style: { color: 'var(--ink)' } }, task.notes));
        for (let i = 0; i < logs.length; i++) {
          activityBits.push(h('div', { className: 'le', key: 'l' + i }, String(logs[i])));
        }
        if (activityBits.length) body.push(h('div', { className: 'dsect', key: 'act' },
          h('div', { className: 'sl' }, 'activity'),
          h('div', { className: 'activity' }, ...activityBits)));
      }

      return h('div', { id: 'detail', className: open ? 'open' : '' },
        open ? h('div', { className: 'dpanel' },
          h('div', { className: 'dhead' },
            h('span', { className: 'lamp', style: { background: lamp, color: lamp } }),
            h('div', { className: 'htext' },
              h('div', { className: 'htitle' + ((task.title || '').trim() ? '' : ' empty') },
                (task.title || '').trim() || 'untitled'),
              h('div', { className: 'hmeta' },
                h('span', { className: 'hid' }, task.id),
                h('span', { className: 'hstat', style: { color: lamp } },
                  STATUS_LABEL[task.status] || task.status),
              ),
            ),
            h('div', { className: 'dclose', onClick: onClose, title: 'close (or click canvas)' }, '✕'),
          ),
          ...body,
        ) : null,
      );
    }

    // a dependency / dependent line: lamp + id + title + status, clickable
    function depItem(id, an, onPick) {
      const t = an.byId.get(id);
      const status = t ? t.status : 'unknown';
      const c = statusColor(status);
      const title = t && (t.title || '').trim();
      return h('div', { className: 'depitem', key: id, onClick: () => onPick(id) },
        h('span', { className: 'lamp', style: { background: c, color: c } }),
        h('span', { className: 'dt' },
          h('span', { className: 'did' }, id),
          title || h('span', { style: { color: 'var(--ink-faint)', fontStyle: 'italic' } }, 'untitled')),
        h('span', { className: 'ds', style: { color: c } }, STATUS_LABEL[status] || status),
      );
    }

    function Legend({ counts, total }) {
      return h('div', { className: 'legend' },
        h('div', { className: 'lhead' },
          h('span', null, 'status'),
          h('span', { className: 'total' }, total + ' tasks'),
        ),
        h('div', { className: 'grid' },
          STATUS_ORDER.map(s => {
            const n = counts[s] || 0;
            const c = statusColor(s);
            return h('div', { className: 'row' + (n ? ' live' : ''), key: s },
              h('span', { className: 'lamp', style: { background: c, color: c } }),
              h('span', { className: 'nm' }, STATUS_LABEL[s] || s),
              h('span', { className: 'ct' }, n ? n : '·'),
            );
          }),
        ),
        h('div', { className: 'spine-key' },
          h('span', { className: 'bar' }),
          h('span', { className: 'nm' }, 'critical path'),
        ),
      );
    }

    function App() {
      return h(ReactFlowProvider, null, h(Board, null));
    }

    createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>
</html>
