# ccm-ci —— ccm 产品门 + plugin maintainer-contract 门。
# required status `build-and-check` 保持稳定，内部聚合 ccm 与 plugin-contracts 两条独立证据线。
name: ccm-ci

on:
  # pull_request 不限 paths：build-and-check 是 main 分支保护的 required status check，
  # 必须对每个 PR 都 report success——否则不碰 ccm/ 的 PR（skills / docs / hooks 改动）
  # 因这个 check 从不运行而永久 BLOCKED（required check 永不满足）。ccm 未变时
  # turbo/pnpm 缓存让 build/typecheck/lint/test 四步快速过，代价可接受。
  pull_request:
  # push 仍按 paths 收窄：main 上非 ccm 改动无需重复跑 ccm CI（push 不是 PR merge 门）。
  push:
    paths:
      - 'ccm/**'
      - '.github/workflows/ccm-ci.yml'

jobs:
  ccm:
    name: ccm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 版本对齐 ccm/package.json 的 packageManager（pnpm@10.22.0）。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      # setup-node 装的是 nodejs.org 官方 node；启用 pnpm store 缓存加速依赖安装。
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ccm/pnpm-lock.yaml

      # 用 --frozen-lockfile 保证依赖与 lockfile 严格一致（不改 lock）。
      - name: Install deps
        working-directory: ccm
        run: pnpm install --frozen-lockfile

      # 以下四步与本地 `pnpm -C ccm run <x>` 一一对应；turbo 内部已处理任务依赖顺序。
      - name: Build
        run: pnpm -C ccm run build

      - name: Typecheck
        run: pnpm -C ccm run typecheck

      - name: Lint
        run: pnpm -C ccm run lint

      - name: Test
        run: pnpm -C ccm run test

  plugin-contracts:
    name: plugin-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Skill knowledge scaffold contract tests
        run: node --test tests/content/skill-knowledge-scaffold.test.mjs

      - name: Skill knowledge K0 source check
        run: node scripts/skill-knowledge.mjs check --stage K0 --json

  # Branch protection depends on this exact job id. Keep it as the stable aggregate instead of
  # renaming the required check every time an independent product/plugin gate is added.
  build-and-check:
    name: build-and-check
    if: ${{ always() }}
    needs: [ccm, plugin-contracts]
    runs-on: ubuntu-latest
    steps:
      - name: Require every component gate
        env:
          CCM_RESULT: ${{ needs.ccm.result }}
          PLUGIN_CONTRACTS_RESULT: ${{ needs.plugin-contracts.result }}
        run: |
          test "${CCM_RESULT}" = "success"
          test "${PLUGIN_CONTRACTS_RESULT}" = "success"
