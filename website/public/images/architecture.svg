<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    @media (prefers-color-scheme: dark) {
      [fill='#4a5368'] { fill: #d6dbe6; }
      [fill='#6b7280'] { fill: #a8b0c0; }
      [fill='#b96a04'] { fill: #eda33a; }
      [fill='#3d7a63'] { fill: #4fc79a; }
    }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b93a7"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d97f06"/>
    </marker>
  </defs>

  <!-- ============ left: harnesses ============ -->
  <text x="40" y="30" font-size="11" letter-spacing="2.5" fill="#8b93a7" font-family="ui-monospace, monospace">ANY SUPPORTED HARNESS — MAIN SESSION AGENT</text>

  <g>
    <rect x="40" y="52" width="260" height="76" rx="9" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.45"/>
    <text x="60" y="84" font-size="15" font-weight="600" fill="#4a5368">Claude Code</text>
    <text x="60" y="106" font-size="11" fill="#8b93a7">plugin adapter · statusline · account pool</text>
  </g>
  <g>
    <rect x="40" y="182" width="260" height="76" rx="9" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.45"/>
    <text x="60" y="214" font-size="15" font-weight="600" fill="#4a5368">Codex</text>
    <text x="60" y="236" font-size="11" fill="#8b93a7">plugin adapter · 7-day window pacing</text>
  </g>
  <g>
    <rect x="40" y="312" width="260" height="76" rx="9" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.45"/>
    <text x="60" y="344" font-size="15" font-weight="600" fill="#4a5368">Cursor IDE · Agent</text>
    <text x="60" y="366" font-size="11" fill="#8b93a7">plugin adapter · billing-period pacing</text>
  </g>
  <g>
    <rect x="40" y="442" width="260" height="76" rx="9" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.45"/>
    <text x="60" y="474" font-size="15" font-weight="600" fill="#4a5368">kimi-code</text>
    <text x="60" y="496" font-size="11" fill="#8b93a7">plugin adapter · core hooks skeleton</text>
  </g>

  <!-- converge arrows -->
  <path d="M300 90 C 370 90, 380 260, 445 272" fill="none" stroke="#8b93a7" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M300 220 C 360 220, 390 285, 445 292" fill="none" stroke="#8b93a7" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M300 350 C 360 350, 390 320, 445 314" fill="none" stroke="#8b93a7" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M300 480 C 370 480, 380 350, 445 336" fill="none" stroke="#8b93a7" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ center: plugin chip + orchestrator hub ============ -->
  <rect x="445" y="112" width="330" height="58" rx="8" fill="none" stroke="#8b93a7" stroke-opacity="0.5" stroke-dasharray="4 3"/>
  <text x="610" y="136" font-size="11.5" text-anchor="middle" fill="#6b7280" font-weight="600">cc-master plugin — one source, per-harness adapters</text>
  <text x="610" y="156" font-size="10.5" text-anchor="middle" fill="#8b93a7" font-family="ui-monospace, monospace">commands · skills · hooks</text>
  <path d="M610 170 L 610 218" stroke="#8b93a7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="622" y="200" font-size="10" fill="#8b93a7">initializes</text>

  <rect x="445" y="224" width="330" height="168" rx="11" fill="#d97f06" fill-opacity="0.08" stroke="#d97f06" stroke-opacity="0.75" stroke-width="1.6"/>
  <text x="610" y="262" font-size="19" font-weight="700" text-anchor="middle" fill="#b96a04" letter-spacing="1">MASTER ORCHESTRATOR</text>
  <text x="610" y="286" font-size="11.5" text-anchor="middle" fill="#6b7280">the session's main agent, promoted to project lead</text>
  <text x="610" y="330" font-size="10.5" text-anchor="middle" fill="#8b93a7" font-family="ui-monospace, monospace">decompose · dispatch · pace · verify · ask</text>
  <text x="610" y="352" font-size="10.5" text-anchor="middle" fill="#8b93a7" font-family="ui-monospace, monospace">the conductor never plays an instrument</text>

  <!-- ============ process boundary ============ -->
  <path d="M775 292 L 823 292" stroke="#d97f06" stroke-width="2" marker-end="url(#arrAmber)"/>
  <path d="M823 310 L 775 310" stroke="#d97f06" stroke-width="2" marker-end="url(#arrAmber)"/>
  <text x="799" y="276" font-size="10" text-anchor="middle" fill="#b96a04" font-weight="600">process boundary</text>
  <text x="799" y="330" font-size="9.5" text-anchor="middle" fill="#8b93a7" font-family="ui-monospace, monospace">shell + JSON</text>

  <!-- ============ right: ccm engine ============ -->
  <rect x="825" y="112" width="335" height="252" rx="11" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.5"/>
  <text x="845" y="144" font-size="16" font-weight="700" fill="#4a5368">ccm — the engine</text>
  <text x="845" y="164" font-size="10.5" fill="#8b93a7" font-family="ui-monospace, monospace">single binary · @ccm/engine · hard prerequisite</text>

  <g font-size="10.5" font-family="ui-monospace, monospace" fill="#4a5368">
    <rect x="845" y="180" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="857" y="199">board · graph</text>
    <rect x="1000" y="180" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="1012" y="199">goal contract</text>
    <rect x="845" y="220" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="857" y="239">quota · pacing</text>
    <rect x="1000" y="220" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="1012" y="239">estimate · Monte Carlo</text>
    <rect x="845" y="260" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="857" y="279">worker · registry</text>
    <rect x="1000" y="260" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="1012" y="279">status-report</text>
    <rect x="845" y="300" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="857" y="319">monitor daemon</text>
    <rect x="1000" y="300" width="145" height="30" rx="6" fill="#8b93a7" fill-opacity="0.1"/><text x="1012" y="319">82 lint invariants</text>
  </g>

  <!-- engine → boards store -->
  <path d="M940 364 L 940 398" stroke="#8b93a7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="952" y="386" font-size="9.5" fill="#8b93a7">locked writes · lint</text>

  <!-- boards store -->
  <g>
    <rect x="825" y="400" width="335" height="76" rx="9" fill="#2fa77a" fill-opacity="0.07" stroke="#2fa77a" stroke-opacity="0.45"/>
    <ellipse cx="862" cy="424" rx="13" ry="6" fill="none" stroke="#2fa77a" stroke-opacity="0.7"/>
    <path d="M849 424 v22 c0 3.3 5.8 6 13 6 s13 -2.7 13 -6 v-22" fill="none" stroke="#2fa77a" stroke-opacity="0.7"/>
    <text x="888" y="430" font-size="12.5" font-weight="600" fill="#3d7a63">boards/ — the single source of truth</text>
    <text x="888" y="450" font-size="10" fill="#8b93a7" font-family="ui-monospace, monospace">$CC_MASTER_HOME · goal briefs · account registry</text>
  </g>

  <!-- boards → viewer (read-only) -->
  <path d="M1060 476 L 1060 512" stroke="#8b93a7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="1072" y="500" font-size="9.5" fill="#8b93a7">read-only</text>

  <!-- viewer -->
  <rect x="825" y="516" width="335" height="76" rx="9" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.45"/>
  <text x="845" y="546" font-size="13" font-weight="600" fill="#4a5368">ccm web-viewer — mission control</text>
  <text x="845" y="566" font-size="10" fill="#8b93a7" font-family="ui-monospace, monospace">graph · board · timeline · decisions · agents</text>

  <!-- ============ workers pool ============ -->
  <path d="M610 392 L 610 448" stroke="#8b93a7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="622" y="424" font-size="10" fill="#8b93a7">dispatches cross-harness</text>
  <rect x="445" y="452" width="330" height="92" rx="9" fill="#8b93a7" fill-opacity="0.07" stroke="#8b93a7" stroke-opacity="0.45"/>
  <text x="465" y="482" font-size="13" font-weight="600" fill="#4a5368">headless worker pool — ccm worker</text>
  <text x="465" y="504" font-size="10.5" fill="#8b93a7" font-family="ui-monospace, monospace">Claude Code CLI · Codex CLI · Cursor Agent CLI</text>
  <text x="465" y="524" font-size="10" fill="#8b93a7">every CLI on the machine is a candidate worker</text>

  <!-- footer -->
  <text x="600" y="624" font-size="11" text-anchor="middle" fill="#8b93a7" font-style="italic">the origin harness decides where the orchestrator sits — not what it can command</text>
</svg>
